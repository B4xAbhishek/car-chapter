<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CarChapter</title>
    <script>
      // Redirect unknown GitHub Pages paths back to index with encoded route.
      // Keep 1 segment for project pages (/repo/route), 0 for user pages (/route).
      var l = window.location;
      var pathParts = l.pathname.split('/').filter(Boolean);
      var pathSegmentsToKeep = pathParts.length > 1 ? 1 : 0;
      var keptPath = l.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/');
      var routePath = l.pathname
        .slice(1)
        .split('/')
        .slice(pathSegmentsToKeep)
        .join('/');
      var route = '/' + routePath + l.search + l.hash;

      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          keptPath +
          '/?p=' +
          encodeURIComponent(route.replace(/&/g, '~and~'))
      );
    </script>
  </head>
  <body></body>
</html>
